services:
  minio:
    container_name: minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INSIDE://:9092,OUTSIDE://:29092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafdrop:
    image: obsidiandynamics/kafdrop:3.30.0
    container_name: kafdrop
    depends_on:
      - kafka
    ports:
      - "9003:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      SERVER_SERVLET_CONTEXTPATH: "/"

  postgres:
    container_name: postgres
    image: postgres:12
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "NayaPass123!"
      POSTGRES_DB: cyber_threat_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-airflow:
    container_name: postgres-airflow
    image: postgres:16
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:7.13.2
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      xpack.security.enabled: "false"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:7.13.2
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  spark-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: spark-consumer
    depends_on:
      - kafka
      - minio
      - elasticsearch
      - postgres
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYSPARK_PYTHON: python3
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: abuseipdb_blacklist_topic
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      MINIO_BUCKET: cyber-threat-intelligence
      OTX_PROCESSED_PREFIX: processed/otx/
      GEO_PROCESSED_PREFIX: processed/geoip/
      ES_HOST: http://elasticsearch:9200
      ES_INDEX: ip_profiles_enriched
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: cyber_threat_intelligence
      PG_USER: postgres
      PG_PASSWORD: "NayaPass123!"
      PG_TABLE: ip_profiles_enriched
      CHECKPOINT_LOCATION: checkpoints/ip_profiles_enriched_direct_sinks_recalc_v2
    command: python consumer_enrich_ip_profiles_ELK_PG.py

  ip-lookup-api:
    build:
      context: .
      dockerfile: Dockerfile.lookup
    container_name: ip-lookup-api
    depends_on:
      - elasticsearch
      - postgres
    working_dir: /app
    volumes:
      - .:/app
    environment:
      ES_HOST: http://elasticsearch:9200
      ES_INDEX: ip_profiles_enriched
      GEOIP_API_KEY: ${GEOIP_API_KEY}
      ABUSE_API_KEY: ${ABUSE_API_KEY}
      OTX_API_KEY: ${OTX_API_KEY}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: cyber_threat_intelligence
      PG_USER: postgres
      PG_PASSWORD: "NayaPass123!"
      PG_TABLE: ip_profiles_enriched
    ports:
      - "8000:8000"
    command: uvicorn ip_lookup_app:app --host 0.0.0.0 --port 8000

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      - postgres-airflow
    working_dir: /opt/airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs
      - ./airflow-plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
      - ./airflow-passwords:/opt/airflow
    command: airflow db migrate

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-api-server
    depends_on:
      - postgres-airflow
      - airflow-init
    working_dir: /opt/airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs
      - ./airflow-plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
      - ./airflow-passwords:/opt/airflow
    ports:
      - "8080:8080"
    command: airflow api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      - postgres-airflow
      - airflow-init
    working_dir: /opt/airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs
      - ./airflow-plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
      - ./airflow-passwords:/opt/airflow
    command: airflow scheduler

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-dag-processor
    depends_on:
      - postgres-airflow
      - airflow-init
    working_dir: /opt/airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow-logs:/opt/airflow/logs
      - ./airflow-plugins:/opt/airflow/plugins
      - .:/opt/airflow/project
      - ./airflow-passwords:/opt/airflow
    command: airflow dag-processor

volumes:
  elasticsearch_data:
  postgres_data:
  postgres_airflow_data: